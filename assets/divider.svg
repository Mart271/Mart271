<svg width="1000" height="28" viewBox="0 0 1000 28" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="section divider">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0078D4" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0078D4"/>
      <stop offset="50%" stop-color="#00AEEF"/>
      <stop offset="80%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#0078D4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6FD6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6FD6FF"/>
      <stop offset="100%" stop-color="#6FD6FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="13" width="1000" height="2" fill="url(#line)"/>
  <rect x="-160" y="12" width="160" height="4" rx="2" fill="url(#pulse)">
    <animate attributeName="x" values="-160;1000" dur="4s" repeatCount="indefinite"/>
  </rect>
  <polygon points="492,7 500,14 492,21 484,14" fill="#00AEEF">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </polygon>
</svg>
