<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MARK — developer profile banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09121F"/>
      <stop offset="55%" stop-color="#0B1E36"/>
      <stop offset="100%" stop-color="#09121F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="50%" stop-color="#00AEEF"/>
      <stop offset="100%" stop-color="#6FD6FF"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00AEEF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00AEEF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1000" height="300" fill="url(#bg)"/>

  <!-- grid -->
  <g stroke="#12283F" stroke-width="1" opacity="0.6">
    <line x1="0" y1="75"  x2="1000" y2="75"/>
    <line x1="0" y1="150" x2="1000" y2="150"/>
    <line x1="0" y1="225" x2="1000" y2="225"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
  </g>

  <!-- diagonal energy slashes (right side) -->
  <g opacity="0.9">
    <polygon points="780,0 850,0 730,300 660,300" fill="#0D2A45"/>
    <polygon points="870,0 905,0 785,300 750,300" fill="#0078D4" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0.75;0.45" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="925,0 945,0 825,300 805,300" fill="#00AEEF" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="975,0 990,0 870,300 855,300" fill="#6FD6FF" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.7;0.35" dur="5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- scanning line -->
  <rect x="0" y="0" width="1000" height="2" fill="url(#accent)" opacity="0.6">
    <animate attributeName="y" values="0;298;0" dur="10s" repeatCount="indefinite"/>
  </rect>

  <!-- top-left system chrome -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="3">
    <text x="48" y="52" fill="#6FD6FF" opacity="0.85">SYSTEM // ONLINE</text>
    <circle cx="36" cy="48" r="4" fill="#00AEEF">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="3">
    <text x="960" y="52" fill="#3E6C96" text-anchor="end">v2026.07</text>
  </g>

  <!-- name -->
  <g transform="skewX(-6)">
    <text x="72" y="168" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="92" font-weight="800" fill="#FFFFFF" letter-spacing="8">MARK</text>
    <text x="76" y="172" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="92" font-weight="800" fill="url(#accent)" letter-spacing="8" opacity="0.35">MARK</text>
  </g>

  <!-- animated underline -->
  <rect x="52" y="188" width="330" height="4" fill="url(#accent)" rx="2">
    <animate attributeName="width" values="330;380;330" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="52" y="188" width="330" height="18" fill="url(#glow)"/>

  <!-- roles -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" letter-spacing="2.5" fill="#C4D6E8">
    <text x="52" y="232">COMPUTER SCIENCE STUDENT</text>
    <text x="330" y="232" fill="#3E6C96">|</text>
    <text x="350" y="232">BACKEND DEVELOPER</text>
    <text x="560" y="232" fill="#3E6C96">|</text>
    <text x="580" y="232" fill="#6FD6FF">CYBERSECURITY</text>
    <text x="742" y="232" fill="#3E6C96">|</text>
    <text x="762" y="232">MACHINE LEARNING</text>
  </g>

  <!-- bottom bar -->
  <rect x="0" y="292" width="1000" height="8" fill="url(#accent)" opacity="0.85"/>
</svg>

<svg width="1000" height="28" viewBox="0 0 1000 28" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="section divider">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0078D4" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0078D4"/>
      <stop offset="50%" stop-color="#00AEEF"/>
      <stop offset="80%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#0078D4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6FD6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6FD6FF"/>
      <stop offset="100%" stop-color="#6FD6FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="13" width="1000" height="2" fill="url(#line)"/>
  <rect x="-160" y="12" width="160" height="4" rx="2" fill="url(#pulse)">
    <animate attributeName="x" values="-160;1000" dur="4s" repeatCount="indefinite"/>
  </rect>
  <polygon points="492,7 500,14 492,21 484,14" fill="#00AEEF">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </polygon>
</svg>
